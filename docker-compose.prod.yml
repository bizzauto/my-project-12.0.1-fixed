# ==============================================
# BizzAuto CRM - Production Stack
# Nginx (SSL) + App + DB + Redis + n8n + Evolution
# ==============================================

version: '3.8'

services:
  # ==================== NGINX (Reverse Proxy + SSL) ====================
  nginx:
    image: nginx:alpine
    container_name: bizzauto-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/letsencrypt:ro
      - uploads_data:/var/www/uploads:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - bizzauto-network
    deploy:
      resources:
        limits:
          memory: 256M

  # ==================== CERTBOT (SSL Auto-Renewal) ====================
  certbot:
    image: certbot/certbot:latest
    container_name: bizzauto-certbot
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"
    networks:
      - bizzauto-network

  # ==================== BIZZAUTO APP ====================
  app:
    image: ghcr.io/infoledbrighter-boop/bizzauto:latest
    container_name: bizzauto-app
    restart: always
    expose:
      - "4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - CORS_ORIGIN=${FRONTEND_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      - VITE_API_URL=${API_URL}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL:-http://evolution-api:8080}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_INSTANCE_NAME=${EVOLUTION_INSTANCE_NAME:-bizzauto}
      - N8N_URL=${N8N_URL:-http://n8n:5678}
      - N8N_APP_API_KEY=${N8N_APP_API_KEY}
      - N8N_API_KEY=${N8N_API_KEY}
      - N8N_PASSWORD=${N8N_PASSWORD}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GROK_API_KEY=${GROK_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - NVIDIA_NIM_API_KEY=${NVIDIA_NIM_API_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM:-"BizzAuto CRM <noreply@bizzautoai.com>"}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - RAZORPAY_WEBHOOK_SECRET=${RAZORPAY_WEBHOOK_SECRET}
      - META_APP_ID=${META_APP_ID}
      - WHATSAPP_REDIRECT_URL=${WHATSAPP_REDIRECT_URL}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URL=${GOOGLE_REDIRECT_URL}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - bizzauto-network
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 512M

  # ==================== REDIS ====================
  redis:
    image: redis:7-alpine
    container_name: bizzauto-redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - bizzauto-network
    deploy:
      resources:
        limits:
          memory: 256M

  # ==================== EVOLUTION API (WhatsApp) ====================
  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: bizzauto-evolution
    restart: always
    expose:
      - "8080"
    environment:
      - SERVER_PORT=8080
      - SERVER_TYPE=http
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - AUTHENTICATION_EXCLUDE_INSTANCES=default
      - DATABASE_ENABLED=true
      - DATABASE_CONNECTION_URI=${EVOLUTION_DATABASE_URL:-${DATABASE_URL}}
      - DATABASE_SAVE_MESSAGES=true
      - DATABASE_SAVE_CONTACTS=true
      - DATABASE_SAVE_INSTANCES=true
      - REDIS_ENABLED=true
      - REDIS_URI=${REDIS_URL:-redis://redis:6379}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - WEBHOOK_GLOBAL_URL=${EVOLUTION_WEBHOOK_URL:-${FRONTEND_URL:-https://bizzautoai.com}/api/evolution/webhook}
      - WEBHOOK_GLOBAL_ENABLED=true
      - QRCODE_LIMIT=30
      - QRCODE_COLOR=#25D366
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - bizzauto-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ==================== n8n WORKFLOW AUTOMATION ====================
  n8n:
    image: n8nio/n8n:latest
    container_name: bizzauto-n8n
    restart: always
    expose:
      - "5678"
    environment:
      - N8N_PORT=5678
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - N8N_SECURE_COOKIE=false
      - N8N_METRICS=false
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_USER_MANAGEMENT_JWT_SECRET=${N8N_USER_MANAGEMENT_JWT_SECRET}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-https://bizzautoai.com}
      - GENERIC_TIMEZONE=Asia/Kolkata
      - DB_TYPE=sqlite
      - DB_SQLITE_DATABASE=/home/node/.n8n/database.sqlite
      - N8N_APP_URL=${FRONTEND_URL:-https://bizzautoai.com}
      - N8N_API_URL=${API_URL:-https://bizzautoai.com}
      - N8N_OPENROUTER_KEY=${OPENROUTER_API_KEY}
    volumes:
      - n8n_data:/home/node/.n8n
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - bizzauto-network
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  bizzauto-network:
    driver: bridge

volumes:
  redis_data:
  n8n_data:
  evolution_instances:
  uploads_data:
  certbot-www:
