<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background -->
  <rect width="200" height="200" fill="white"/>
  
  <!-- Bar Chart -->
  <rect x="40" y="100" width="25" height="60" rx="4" fill="#7DD3FC"/>
  <rect x="75" y="80" width="25" height="80" rx="4" fill="#38BDF8"/>
  <rect x="110" y="60" width="25" height="100" rx="4" fill="#0EA5E9"/>
  <rect x="145" y="40" width="25" height="120" rx="4" fill="#0369A1"/>
  
  <!-- Upward Arrow -->
  <path d="M40 90 L170 30 L170 50 L40 110 Z" fill="#0369A1"/>
  <polygon points="170,30 190,50 170,70" fill="#0369A1"/>
  
  <!-- Clouds -->
  <ellipse cx="100" cy="170" rx="60" ry="20" fill="#BAE6FD"/>
  <ellipse cx="70" cy="165" rx="30" ry="15" fill="#E0F2FE"/>
  <ellipse cx="130" cy="165" rx="30" ry="15" fill="#E0F2FE"/>
  
  <!-- 10X Text -->
  <text x="160" y="25" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0369A1">10X</text>
  
  <!-- BizzAuto Ai Text -->
  <text x="100" y="195" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0369A1" text-anchor="middle">BizzAuto Ai</text>
</svg>